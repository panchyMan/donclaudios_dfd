<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, sans-serif); background: transparent; color: var(--color-text-primary); }
.dfd-wrap { width: 100%; overflow-x: auto; padding: 12px 0; }
svg text { font-family: var(--font-sans, sans-serif); }
.node-click { cursor: pointer; }
.node-click:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="dfd-wrap">
<svg width="100%" viewBox="0 0 1200 900" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>LeCHOW System Data Flow Diagram</title>
  <desc>Data flow diagram showing how data moves between Customers, Cashiers, Owners, and the kitchen in the LeCHOW restaurant system.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ============ EXTERNAL ENTITIES ============ -->
  <!-- Registered Customer (top-left) -->
  <g class="node-click">
    <rect x="20" y="60" width="148" height="52" rx="0" fill="none" stroke="#888780" stroke-width="2"/>
    <text x="94" y="82" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#5F5E5A">Registered</text>
    <text x="94" y="98" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#5F5E5A">Customer</text>
  </g>

  <!-- Guest Customer (top-left below) -->
  <g class="node-click">
    <rect x="20" y="200" width="148" height="52" rx="0" fill="none" stroke="#888780" stroke-width="2"/>
    <text x="94" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#5F5E5A">Guest</text>
    <text x="94" y="234" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#5F5E5A">Customer</text>
  </g>

  <!-- Cashier (left-mid) -->
  <g class="node-click">
    <rect x="20" y="420" width="148" height="52" rx="0" fill="none" stroke="#888780" stroke-width="2"/>
    <text x="94" y="446" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#5F5E5A">Cashier</text>
  </g>

  <!-- Owner (bottom-left) -->
  <g class="node-click">
    <rect x="20" y="700" width="148" height="52" rx="0" fill="none" stroke="#888780" stroke-width="2"/>
    <text x="94" y="726" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#5F5E5A">Owner / Admin</text>
  </g>

  <!-- Kitchen (top-right) -->
  <g class="node-click">
    <rect x="1030" y="60" width="148" height="52" rx="0" fill="none" stroke="#888780" stroke-width="2"/>
    <text x="1104" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#5F5E5A">Kitchen</text>
  </g>

  <!-- Supplier (bottom-right) -->
  <g class="node-click">
    <rect x="1030" y="700" width="148" height="52" rx="0" fill="none" stroke="#888780" stroke-width="2"/>
    <text x="1104" y="726" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#5F5E5A">Supplier</text>
  </g>

  <!-- ============ PROCESSES (rounded rect with number) ============ -->
  <!-- P1: Place Order -->
  <g class="node-click">
    <rect x="255" y="100" width="175" height="70" rx="35" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
    <rect x="255" y="100" width="32" height="70" rx="0" fill="#EF9F27" stroke="none"/>
    <rect x="255" y="100" width="32" height="70" rx="35" fill="#EF9F27" stroke="none"/>
    <rect x="271" y="100" width="16" height="70" fill="#EF9F27" stroke="none"/>
    <text x="263" y="136" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#412402">1</text>
    <text x="355" y="128" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#412402">Place Order</text>
    <text x="355" y="148" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#633806">/ Submit Request</text>
  </g>

  <!-- P2: Confirm Guest Order -->
  <g class="node-click">
    <rect x="255" y="245" width="175" height="70" rx="35" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
    <rect x="255" y="245" width="32" height="70" rx="0" fill="#EF9F27" stroke="none"/>
    <rect x="255" y="245" width="32" height="70" rx="35" fill="#EF9F27" stroke="none"/>
    <rect x="271" y="245" width="16" height="70" fill="#EF9F27" stroke="none"/>
    <text x="263" y="281" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#412402">2</text>
    <text x="355" y="269" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#412402">Confirm Guest</text>
    <text x="355" y="289" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#633806">Order (Call)</text>
  </g>

  <!-- P3: Process Transaction -->
  <g class="node-click">
    <rect x="255" y="400" width="175" height="70" rx="35" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
    <rect x="255" y="400" width="32" height="70" rx="0" fill="#EF9F27" stroke="none"/>
    <rect x="255" y="400" width="32" height="70" rx="35" fill="#EF9F27" stroke="none"/>
    <rect x="271" y="400" width="16" height="70" fill="#EF9F27" stroke="none"/>
    <text x="263" y="436" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#412402">3</text>
    <text x="355" y="422" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#412402">Process</text>
    <text x="355" y="442" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#633806">Transaction / POS</text>
  </g>

  <!-- P4: Manage Orders & Kitchen -->
  <g class="node-click">
    <rect x="500" y="100" width="190" height="70" rx="35" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="500" y="100" width="32" height="70" rx="0" fill="#1D9E75" stroke="none"/>
    <rect x="500" y="100" width="32" height="70" rx="35" fill="#1D9E75" stroke="none"/>
    <rect x="516" y="100" width="16" height="70" fill="#1D9E75" stroke="none"/>
    <text x="508" y="136" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#04342C">4</text>
    <text x="608" y="122" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#04342C">Manage Orders</text>
    <text x="608" y="142" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#085041">& Kitchen Dispatch</text>
    <text x="608" y="158" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#085041">/ Track Status</text>
  </g>

  <!-- P5: Authenticate Users -->
  <g class="node-click">
    <rect x="500" y="245" width="190" height="70" rx="35" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="500" y="245" width="32" height="70" rx="0" fill="#1D9E75" stroke="none"/>
    <rect x="500" y="245" width="32" height="70" rx="35" fill="#1D9E75" stroke="none"/>
    <rect x="516" y="245" width="16" height="70" fill="#1D9E75" stroke="none"/>
    <text x="508" y="281" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#04342C">5</text>
    <text x="608" y="267" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#04342C">Authenticate</text>
    <text x="608" y="287" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#085041">Cashier / Customer</text>
  </g>

  <!-- P6: Generate Reports -->
  <g class="node-click">
    <rect x="500" y="400" width="190" height="70" rx="35" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="500" y="400" width="32" height="70" rx="0" fill="#1D9E75" stroke="none"/>
    <rect x="500" y="400" width="32" height="70" rx="35" fill="#1D9E75" stroke="none"/>
    <rect x="516" y="400" width="16" height="70" fill="#1D9E75" stroke="none"/>
    <text x="508" y="436" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#04342C">6</text>
    <text x="608" y="422" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#04342C">Generate Reports</text>
    <text x="608" y="442" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#085041">Analytics / Sales</text>
  </g>

  <!-- P7: Manage Inventory -->
  <g class="node-click">
    <rect x="500" y="550" width="190" height="70" rx="35" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="500" y="550" width="32" height="70" rx="0" fill="#1D9E75" stroke="none"/>
    <rect x="500" y="550" width="32" height="70" rx="35" fill="#1D9E75" stroke="none"/>
    <rect x="516" y="550" width="16" height="70" fill="#1D9E75" stroke="none"/>
    <text x="508" y="586" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#04342C">7</text>
    <text x="608" y="572" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#04342C">Manage Inventory</text>
    <text x="608" y="592" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#085041">Products / Promos</text>
  </g>

  <!-- P8: Send Notifications -->
  <g class="node-click">
    <rect x="500" y="700" width="190" height="70" rx="35" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="500" y="700" width="32" height="70" rx="0" fill="#1D9E75" stroke="none"/>
    <rect x="500" y="700" width="32" height="70" rx="35" fill="#1D9E75" stroke="none"/>
    <rect x="516" y="700" width="16" height="70" fill="#1D9E75" stroke="none"/>
    <text x="508" y="736" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#04342C">8</text>
    <text x="608" y="722" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#04342C">Send Notifications</text>
    <text x="608" y="742" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#085041">Email / SMS</text>
  </g>

  <!-- ============ DATA STORES ============ -->
  <!-- D1: Orders -->
  <g>
    <rect x="790" y="108" width="190" height="52" rx="0" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <line x1="812" y1="108" x2="812" y2="160" stroke="#185FA5" stroke-width="1.5"/>
    <text x="810" y="134" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#0C447C">D1</text>
    <text x="897" y="134" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C">Order Store</text>
  </g>

  <!-- D2: Customers -->
  <g>
    <rect x="790" y="253" width="190" height="52" rx="0" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <line x1="812" y1="253" x2="812" y2="305" stroke="#185FA5" stroke-width="1.5"/>
    <text x="810" y="279" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#0C447C">D2</text>
    <text x="897" y="279" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C">Customer Store</text>
  </g>

  <!-- D3: Transactions -->
  <g>
    <rect x="790" y="413" width="190" height="52" rx="0" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <line x1="812" y1="413" x2="812" y2="465" stroke="#185FA5" stroke-width="1.5"/>
    <text x="810" y="439" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#0C447C">D3</text>
    <text x="897" y="439" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C">Transactions</text>
  </g>

  <!-- D4: Products/Inventory -->
  <g>
    <rect x="790" y="563" width="190" height="52" rx="0" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <line x1="812" y1="563" x2="812" y2="615" stroke="#185FA5" stroke-width="1.5"/>
    <text x="810" y="589" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#0C447C">D4</text>
    <text x="897" y="589" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C">Products / Promos</text>
  </g>

  <!-- D5: Cashiers -->
  <g>
    <rect x="790" y="713" width="190" height="52" rx="0" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <line x1="812" y1="713" x2="812" y2="765" stroke="#185FA5" stroke-width="1.5"/>
    <text x="810" y="739" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#0C447C">D5</text>
    <text x="897" y="739" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C">Cashier Accounts</text>
  </g>

  <!-- ============ ARROWS / FLOWS ============ -->

  <!-- Registered Customer → P1 (Order data) -->
  <path d="M168 86 L253 130" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="196" y="100" font-size="10" fill="#5F5E5A" text-anchor="middle">order data</text>

  <!-- P1 → Registered Customer (order status, bill) -->
  <path d="M253 120 L168 96" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="196" y="116" font-size="10" fill="#5F5E5A" text-anchor="middle">status / bill</text>

  <!-- Guest Customer → P2 (guest info) -->
  <path d="M168 226 L253 270" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="200" y="243" font-size="10" fill="#5F5E5A" text-anchor="middle">guest info</text>

  <!-- P2 → Guest Customer (confirmation) -->
  <path d="M253 263 L168 240" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="200" y="258" font-size="10" fill="#5F5E5A" text-anchor="middle">confirmation</text>

  <!-- Cashier → P3 (transaction) -->
  <path d="M168 440 L253 440" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="210" y="432" font-size="10" fill="#5F5E5A" text-anchor="middle">payment</text>

  <!-- P3 → Cashier (receipt) -->
  <path d="M253 455 L168 455" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="210" y="466" font-size="10" fill="#5F5E5A" text-anchor="middle">receipt</text>

  <!-- P1 → P4 (order forwarded) -->
  <path d="M430 135 L498 135" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="464" y="127" font-size="10" fill="#0F6E56" text-anchor="middle">order</text>

  <!-- P4 → Kitchen (order ticket) -->
  <path d="M692 130 L1028 92" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="860" y="103" font-size="10" fill="#0F6E56" text-anchor="middle">order ticket</text>

  <!-- Kitchen → P4 (ready status) -->
  <path d="M1028 102 L692 140" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="860" y="132" font-size="10" fill="#0F6E56" text-anchor="middle">ready status</text>

  <!-- P4 → D1 (write order) -->
  <path d="M692 135 L788 134" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="740" y="127" font-size="10" fill="#185FA5" text-anchor="middle">write order</text>

  <!-- D1 → P4 (read order) -->
  <path d="M788 145 L692 145" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="740" y="158" font-size="10" fill="#185FA5" text-anchor="middle">order data</text>

  <!-- P5 → D2 (verify / store) -->
  <path d="M692 279 L788 279" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="740" y="271" font-size="10" fill="#185FA5" text-anchor="middle">verify / store</text>

  <!-- D2 → P5 (credentials) -->
  <path d="M788 290 L692 290" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="740" y="302" font-size="10" fill="#185FA5" text-anchor="middle">credentials</text>

  <!-- P3 → D3 (log transaction) -->
  <path d="M692 435 L788 435" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="740" y="427" font-size="10" fill="#185FA5" text-anchor="middle">log txn</text>

  <!-- D3 → P6 (transaction data) -->
  <path d="M885 413 L885 470" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="900" y="443" font-size="10" fill="#185FA5" text-anchor="start">txn data</text>

  <!-- P6 → D1 (read orders) -->
  <path d="M790 435 L790 161" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="4 3"/>

  <!-- P7 → D4 (update inventory) -->
  <path d="M692 585 L788 589" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="738" y="578" font-size="10" fill="#185FA5" text-anchor="middle">update</text>

  <!-- D4 → P7 (read stock) -->
  <path d="M788 598 L692 598" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="738" y="611" font-size="10" fill="#185FA5" text-anchor="middle">stock data</text>

  <!-- Owner → P7 (manage products) -->
  <path d="M94 700 L94 630 L498 590" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="200" y="625" font-size="10" fill="#5F5E5A" text-anchor="middle">manage products</text>

  <!-- Owner → P6 (request reports) -->
  <path d="M150 714 L498 445" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="300" y="596" font-size="10" fill="#5F5E5A" text-anchor="middle">request reports</text>

  <!-- P6 → Owner (analytics) -->
  <path d="M595 470 L595 820 L150 740" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="360" y="835" font-size="10" fill="#5F5E5A" text-anchor="middle">analytics / sales report</text>

  <!-- Owner → P5 (create cashier) -->
  <path d="M168 700 L500 295" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="300" y="490" font-size="10" fill="#5F5E5A" text-anchor="middle">create cashier acct</text>

  <!-- P5 → D5 (store cashier) -->
  <path d="M692 265 L885 265 L885 713" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- D5 → P5 label -->
  <path d="M980 739 L980 295 L692 282" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="4 3"/>

  <!-- P8 (Notifications) → Registered Customer -->
  <path d="M500 735 L232 220" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="330" y="510" font-size="10" fill="#0F6E56" text-anchor="middle">promo / order notif</text>

  <!-- Owner → P8 -->
  <path d="M168 726 L498 742" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="330" y="742" font-size="10" fill="#5F5E5A" text-anchor="middle">trigger notif</text>

  <!-- P7 → Supplier (inventory order) -->
  <path d="M692 600 L1028 726" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="870" y="653" font-size="10" fill="#5F5E5A" text-anchor="middle">inventory order</text>

  <!-- Supplier → P7 (delivery) -->
  <path d="M1028 740 L692 615" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="870" y="700" font-size="10" fill="#5F5E5A" text-anchor="middle">stock delivery</text>

  <!-- P2 → P3 (confirmed order) -->
  <path d="M342 315 L342 398" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="362" y="360" font-size="10" fill="#5F5E5A" text-anchor="start">confirmed order</text>

  <!-- P1 → P3 (online order) -->
  <path d="M330 170 L330 398" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="300" y="285" font-size="10" fill="#5F5E5A" text-anchor="end">to cashier</text>

  <!-- ============ LEGEND ============ -->
  <rect x="20" y="845" width="700" height="48" rx="6" fill="none" stroke="#D3D1C7" stroke-width="1"/>
  <text x="36" y="860" font-size="11" font-weight="600" fill="#5F5E5A">Legend:</text>
  <rect x="36" y="870" width="18" height="2" fill="#888780"/>
  <text x="60" y="874" font-size="10" fill="#5F5E5A">Data flow (to)</text>
  <line x1="136" y1="871" x2="154" y2="871" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="160" y="874" font-size="10" fill="#5F5E5A">Return / response</text>
  <rect x="256" y="858" width="40" height="20" rx="0" fill="none" stroke="#888780" stroke-width="1.5"/>
  <text x="276" y="870" font-size="10" fill="#5F5E5A" text-anchor="middle">Entity</text>
  <rect x="330" y="858" width="70" height="20" rx="10" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
